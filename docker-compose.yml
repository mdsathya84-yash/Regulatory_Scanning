version: "3.9"

services:
  scraper:
    build: .
    command: python -m scraper.scheduler
    env_file: .env
    volumes:
      - ./data:/app/data
    restart: unless-stopped

  streamlit:
    build: .
    command: streamlit run ui/app.py --server.port 8501 --server.address 0.0.0.0
    env_file: .env
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
    depends_on:
      - scraper
    restart: unless-stopped
